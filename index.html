<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類提出状況 | 申告サポート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f1ec;--surface:#ffffff;--surface2:#faf8f5;--border:#e8e2d9;
    --text:#1a1714;--text-sub:#7a7065;--accent:#2d5be3;--accent-light:#eef1fd;
    --green:#1a8f5c;--green-light:#e6f5ef;--orange:#d4620a;--orange-light:#fdf0e6;
    --red:#c0392b;--red-light:#fdecea;--yellow:#b58900;--yellow-light:#fdf8e6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

  .header{background:var(--text);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;}
  .header-logo{font-size:13px;font-weight:700;letter-spacing:.05em;opacity:.9;}
  .header-title{font-size:15px;font-weight:500;flex:1;text-align:center;}
  .mode-badge{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.15);letter-spacing:.05em;}
  .mode-badge.admin{background:var(--accent);}

  .mode-switch-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;}
  .mode-tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans JP',sans-serif;}
  .mode-tab:hover{color:var(--text);}
  .mode-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  .container{max-width:900px;margin:0 auto;padding:24px 16px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
  .panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface2);flex-wrap:wrap;}
  .panel-title{font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--text-sub);text-transform:uppercase;}

  /* FILTER */
  .filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);}
  .filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
  .filter-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .filter-search{flex:1;min-width:120px;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);outline:none;}
  .filter-search:focus{border-color:var(--accent);}

  /* CUSTOMER */
  .customer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:16px;}
  .customer-card{padding:12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;text-align:center;background:var(--surface);}
  .customer-card:hover,.customer-card.selected{border-color:var(--accent);background:var(--accent-light);}
  .customer-card .name{font-size:13px;font-weight:500;}
  .customer-card .ccode{font-size:10px;color:var(--text-sub);font-family:'DM Mono',monospace;margin-top:2px;}
  .customer-card .prog{margin-top:4px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-sub);}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
  .complete-badge{display:inline-block;margin-top:4px;font-size:10px;background:var(--green-light);color:var(--green);padding:2px 6px;border-radius:10px;font-weight:700;}

  /* PAGINATION */
  .pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap;}
  .page-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
  .page-btn:hover{border-color:var(--accent);color:var(--accent);}
  .page-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
  .page-btn:disabled{opacity:.3;cursor:default;}
  .page-info{font-size:11px;color:var(--text-sub);padding:0 6px;}

  /* DOC TABLE */
  .doc-table-header{display:grid;grid-template-columns:1fr 100px 130px 1fr;gap:0;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text-sub);letter-spacing:.06em;text-transform:uppercase;}
  .doc-row{display:grid;grid-template-columns:1fr 100px 130px 1fr;gap:0;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s;}
  .doc-row:last-child{border-bottom:none;}
  .doc-row:hover{background:var(--surface2);}
  .doc-name{font-size:13px;font-weight:500;}
  .doc-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-sub);}
  .status-select{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);cursor:pointer;outline:none;width:100%;}
  .status-select:focus{border-color:var(--accent);}
  .comment-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);outline:none;}
  .comment-input:focus{border-color:var(--accent);}

  /* SHARE */
  .share-box{padding:14px 16px;background:var(--surface2);border-top:1px solid var(--border);}
  .share-label{font-size:11px;font-weight:700;color:var(--text-sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
  .share-url-row{display:flex;gap:8px;align-items:center;}
  .share-url{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* BUTTONS */
  .btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;transition:all .15s;letter-spacing:.03em;}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{opacity:.85;}
  .btn-secondary{background:var(--border);color:var(--text);}
  .btn-secondary:hover{background:#d8d2c9;}

  /* ADD FORM */
  .add-form{display:flex;gap:8px;padding:12px 16px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
  .add-form input{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);outline:none;}
  .add-form input:focus{border-color:var(--accent);}
  .add-form input[type="text"]{flex:1;min-width:140px;}
  .add-form input[type="date"]{width:140px;}

  /* KINTONE */
  .kintone-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);}
  .kintone-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .kintone-dot.synced{background:var(--green);}
  .kintone-dot.syncing{background:var(--yellow);animation:pulse 1s infinite;}
  .kintone-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .settings-box{padding:16px;border-top:1px solid var(--border);background:var(--surface2);}
  .settings-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
  .settings-row:last-child{margin-bottom:0;}
  .settings-label{font-size:12px;color:var(--text-sub);width:110px;flex-shrink:0;}
  .settings-input{flex:1;min-width:160px;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface);color:var(--text);outline:none;}
  .settings-input:focus{border-color:var(--accent);}

  /* CLIENT */
  .client-search{display:flex;gap:8px;margin-bottom:20px;}
  .client-search input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);outline:none;}
  .client-search input:focus{border-color:var(--accent);}
  .client-header{background:var(--text);color:white;border-radius:12px 12px 0 0;padding:20px 24px;}
  .client-header .greeting{font-size:12px;opacity:.6;margin-bottom:4px;}
  .client-header .name{font-size:20px;font-weight:700;}
  .client-header .sub{font-size:12px;opacity:.7;margin-top:4px;}
  .client-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  .summary-item{background:var(--surface);padding:16px;text-align:center;}
  .summary-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
  .summary-label{font-size:10px;color:var(--text-sub);margin-top:4px;font-weight:500;}
  .summary-item.green .summary-num{color:var(--green);}
  .summary-item.orange .summary-num{color:var(--orange);}
  .summary-item.red .summary-num{color:var(--red);}
  .client-doc-item{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
  .client-doc-item:last-child{border-bottom:none;}
  .doc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .doc-icon.submitted{background:var(--green-light);}
  .doc-icon.pending{background:var(--yellow-light);}
  .doc-icon.checking{background:var(--orange-light);}
  .doc-icon.complete{background:var(--accent-light);}
  .doc-icon.missing{background:var(--red-light);}
  .doc-info{flex:1;}
  .doc-info-name{font-size:14px;font-weight:500;}
  .doc-info-meta{font-size:11px;color:var(--text-sub);margin-top:3px;font-family:'DM Mono',monospace;}
  .doc-info-comment{margin-top:6px;font-size:12px;color:var(--text-sub);background:var(--surface2);border-left:2px solid var(--border);padding:6px 10px;border-radius:0 4px 4px 0;}
  .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .status-submitted{background:var(--green-light);color:var(--green);}
  .status-pending{background:var(--yellow-light);color:var(--yellow);}
  .status-checking{background:var(--orange-light);color:var(--orange);}
  .status-complete{background:var(--accent-light);color:var(--accent);}
  .status-missing{background:var(--red-light);color:var(--red);}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .25s;z-index:999;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .empty{padding:40px;text-align:center;color:var(--text-sub);}
  .empty-icon{font-size:32px;margin-bottom:8px;}
  .empty-text{font-size:14px;}

  @media(max-width:640px){
    .doc-table-header{display:none;}
    .doc-row{
      display:grid;
      grid-template-columns:1fr 110px;
      grid-template-rows:auto auto auto;
      gap:4px 10px;
      padding:14px 16px;
      align-items:start;
    }
    .doc-row .doc-cell-name{grid-column:1;grid-row:1;}
    .doc-row .doc-cell-status{grid-column:2;grid-row:1;}
    .doc-row .doc-cell-date{grid-column:1;grid-row:2;font-size:11px;color:var(--text-sub);}
    .doc-row .doc-cell-comment{grid-column:1/3;grid-row:3;}
    .doc-row .status-select{width:110px;}
    .doc-row .comment-input{width:100%;}
    .customer-grid{grid-template-columns:repeat(2,1fr);}
    .client-summary{grid-template-columns:repeat(3,1fr);}
    .panel-header{gap:6px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">申告サポート</div>
  <div class="header-title">書類提出状況管理</div>
  <div class="mode-badge admin" id="headerBadge">管理者</div>
</div>
<div class="mode-switch-bar">
  <button class="mode-tab active" onclick="switchMode('admin')">📋 管理画面</button>
  <button class="mode-tab" onclick="switchMode('client')">👤 お客様確認</button>
</div>

<!-- ADMIN -->
<div id="adminView">
<div class="container">

  <!-- kintoneバックアップ -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">kintone バックアップ</span>
      <button class="btn btn-primary" onclick="exportForKintone()">📋 バックアップデータをコピー</button>
    </div>
    <div style="padding:12px 16px;font-size:12px;color:var(--text-sub);line-height:1.8;">
      ① 上のボタンでデータをコピー &nbsp;② Claudeに「kintone App 71へバックアップして」と伝えてデータを貼り付けて依頼
    </div>
  </div>

  <!-- お客様一覧 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">お客様一覧</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
<button class="btn btn-secondary" onclick="toggleHideComplete()" id="hideBtn">完了を非表示</button>
        <button class="btn btn-primary" onclick="showAddCustomer()">＋ お客様を追加</button>
      </div>
    </div>
    <div class="filter-bar">
      <input class="filter-search" id="customerSearch" placeholder="🔍 お客様名・顧客CDで検索" oninput="renderCustomerGrid()">
      <button class="filter-btn active" onclick="setFilter('all')" id="f-all">すべて</button>
      <button class="filter-btn" onclick="setFilter('pending')" id="f-pending">未完了</button>
      <button class="filter-btn" onclick="setFilter('complete')" id="f-complete">完了のみ</button>
    </div>
    <div class="customer-grid" id="customerGrid"></div>
    <div class="pagination" id="customerPagination"></div>
  </div>

  <!-- 書類一覧 -->
  <div class="panel" id="docPanel" style="display:none">
    <div class="panel-header">
      <span class="panel-title" id="docPanelTitle">書類一覧</span>
    </div>
    <div class="doc-table-header">
      <span>書類名</span><span>提出期日</span><span>提出ステータス</span><span>コメント</span>
    </div>
    <div id="docList"></div>
    <div class="add-form">
      <input type="text" id="newDocProject" placeholder="プロジェクト名（例: 25年03月度確定申告）" style="flex:2;min-width:200px">
      <input type="text" id="newDocName" placeholder="書類名を入力">
      <input type="date" id="newDocDate">
      <button class="btn btn-primary" onclick="addDocument()">追加</button>
    </div>
    <!-- URLコピーは1箇所に集約 -->
    <div class="share-box">
      <div class="share-label">お客様共有URL（顧客CD連動）</div>
      <div class="share-url-row">
        <div class="share-url" id="shareUrlDisplay">お客様を選択すると表示されます</div>
        <button class="btn btn-primary" onclick="copyShareUrl()">🔗 コピー</button>
      </div>
    </div>
  </div>

</div>
</div>

<!-- CLIENT -->
<div id="clientView" style="display:none">
<div class="container">
  <div class="panel">
    <div style="padding:16px">
      <div class="share-label" style="margin-bottom:8px">お名前または顧客CDで検索</div>
      <div class="client-search">
        <input type="text" id="clientSearchInput" placeholder="例：山田 太郎 または C001" oninput="searchClient()">
      </div>
      <div id="clientSearchResults"></div>
    </div>
  </div>
  <div id="clientDocView" style="display:none">
    <div class="panel">
      <div class="client-header">
        <div class="greeting">申告サポート　書類提出状況のご確認</div>
        <div class="name" id="clientName">—</div>
        <div class="sub" id="clientSub">—</div>
      </div>
      <div class="client-summary">
        <div class="summary-item green"><div class="summary-num" id="sumSubmitted">0</div><div class="summary-label">提出済み</div></div>
        <div class="summary-item orange"><div class="summary-num" id="sumPending">0</div><div class="summary-label">未提出</div></div>
        <div class="summary-item red"><div class="summary-num" id="sumMissing">0</div><div class="summary-label">要確認</div></div>
      </div>
      <div class="client-doc-list" id="clientDocList"></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUS_LABELS={pending:'未提出',submitted:'提出済み',checking:'確認中',complete:'完了',missing:'書類不備'};
const STATUS_ICONS={pending:'⏳',submitted:'📤',checking:'🔍',complete:'✅',missing:'⚠️'};
const PAGE_SIZE=12;

let data={
  customers:[
    {id:'c1',name:'山田 太郎',code:'C001'},
    {id:'c2',name:'鈴木 花子',code:'C002'},
    {id:'c3',name:'田中 一郎',code:'C003'},
  ],
  documents:{
    c1:[
      {id:'d1',name:'源泉徴収票',due:'2025-02-28',status:'complete',comment:'受領・確認済み',project:'25年03月度確定申告'},
      {id:'d2',name:'医療費領収書',due:'2025-02-28',status:'submitted',comment:'',project:'25年03月度確定申告'},
      {id:'d3',name:'控除証明書（生命保険等）',due:'2025-02-28',status:'checking',comment:'金額が不鮮明です。再送をお願いします。',project:'25年03月度確定申告'},
      {id:'d4',name:'マイナンバー関連書類',due:'2025-02-28',status:'pending',comment:'',project:'25年03月度確定申告'},
      {id:'d5',name:'確定申告書の控え',due:'2025-03-15',status:'complete',comment:'',project:'25年03月度確定申告'},
    ],
    c2:[
      {id:'d6',name:'源泉徴収票',due:'2025-02-28',status:'complete',comment:'',project:'25年03月度確定申告'},
      {id:'d7',name:'医療費領収書',due:'2025-02-28',status:'missing',comment:'昨年の領収書と混在しています。仕分けの上、再送ください。',project:'25年03月度確定申告'},
      {id:'d8',name:'マイナンバー関連書類',due:'2025-02-28',status:'complete',comment:'',project:'25年03月度確定申告'},
    ],
    c3:[
      {id:'d9',name:'源泉徴収票',due:'2025-02-28',status:'pending',comment:'',project:'25年03月度確定申告'},
      {id:'d10',name:'控除証明書（生命保険等）',due:'2025-02-28',status:'pending',comment:'',project:'25年03月度確定申告'},
    ]
  }
};

let selectedCustomerId=null,currentMode='admin',hideComplete=false,currentFilter='all',currentPage=1;

function init(){
  renderCustomerGrid();
  const params=new URLSearchParams(window.location.search);
  const clientCode=params.get('client');
  if(clientCode){
    switchMode('client');
    const c=data.customers.find(c=>c.code===clientCode);
    if(c) showClientDoc(c.id);
  }
}

function switchMode(mode){
  currentMode=mode;
  document.getElementById('adminView').style.display=mode==='admin'?'block':'none';
  document.getElementById('clientView').style.display=mode==='client'?'block':'none';
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active',(mode==='admin'&&i===0)||(mode==='client'&&i===1));
  });
  document.getElementById('headerBadge').textContent=mode==='admin'?'管理者':'お客様';
  document.getElementById('headerBadge').className='mode-badge'+(mode==='admin'?' admin':'');
}

function setFilter(f){
  currentFilter=f;currentPage=1;
  ['all','pending','complete'].forEach(k=>{document.getElementById('f-'+k).classList.toggle('active',k===f);});
  renderCustomerGrid();
}

function toggleHideComplete(){
  hideComplete=!hideComplete;
  document.getElementById('hideBtn').textContent=hideComplete?'完了を表示':'完了を非表示';
  currentPage=1;renderCustomerGrid();
}

function isComplete(cid){
  const docs=data.documents[cid]||[];
  return docs.length>0&&docs.every(d=>d.status==='complete');
}

function renderCustomerGrid(){
  const q=(document.getElementById('customerSearch')?.value||'').trim();
  let list=data.customers.filter(c=>{
    if(hideComplete&&isComplete(c.id)) return false;
    if(currentFilter==='pending'&&isComplete(c.id)) return false;
    if(currentFilter==='complete'&&!isComplete(c.id)) return false;
    if(q&&!c.name.includes(q)&&!c.code.includes(q)) return false;
    return true;
  });
  const total=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  if(currentPage>total) currentPage=total;
  const paged=list.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  const grid=document.getElementById('customerGrid');
  if(paged.length===0){
    grid.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">該当するお客様がいません</div></div>';
  } else {
    grid.innerHTML=paged.map(c=>{
      const docs=data.documents[c.id]||[];
      const done=docs.filter(d=>d.status==='complete'||d.status==='submitted').length;
      const pct=docs.length?Math.round(done/docs.length*100):0;
      const comp=isComplete(c.id);
      return `<div class="customer-card ${selectedCustomerId===c.id?'selected':''}" onclick="selectCustomer('${c.id}')">
        <div class="name">${c.name}</div>
        <div class="ccode">${c.code}</div>
        ${comp?'<div class="complete-badge">✅ 完了</div>':`<div class="prog">${done}/${docs.length} 提出</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`}
      </div>`;
    }).join('');
  }
  const pg=document.getElementById('customerPagination');
  if(total<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++){
    if(total>7&&Math.abs(i-currentPage)>2&&i!==1&&i!==total){
      if(i===currentPage-3||i===currentPage+3) html+='<span class="page-info">…</span>';
      continue;
    }
    html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=total?'disabled':''}>›</button>`;
  html+=`<span class="page-info">${list.length}件中 ${(currentPage-1)*PAGE_SIZE+1}〜${Math.min(currentPage*PAGE_SIZE,list.length)}件</span>`;
  pg.innerHTML=html;
}

function goPage(p){currentPage=p;renderCustomerGrid();}

function selectCustomer(id){
  selectedCustomerId=id;
  renderCustomerGrid();
  const c=data.customers.find(c=>c.id===id);
  document.getElementById('docPanel').style.display='block';
  document.getElementById('docPanelTitle').textContent=c.name+' の書類一覧';
  const baseUrl=window.location.href.split('?')[0];
  // URLパラメータは顧客CDに統一
  document.getElementById('shareUrlDisplay').textContent=`${baseUrl}?client=${c.code}`;
  renderDocList();
}

function renderDocList(){
  const docs=data.documents[selectedCustomerId]||[];
  const list=document.getElementById('docList');
  if(docs.length===0){list.innerHTML='<div class="empty"><div class="empty-icon">📄</div><div class="empty-text">書類を追加してください</div></div>';return;}
  list.innerHTML=docs.map(d=>`
    <div class="doc-row">
      <div class="doc-name doc-cell-name" style="display:flex;flex-direction:column;gap:3px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <span>${d.name}</span>
          <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;flex-shrink:0" onclick="removeDoc('${d.id}')">削除</button>
        </div>
        ${d.project?`<span style="font-size:10px;color:var(--text-sub);font-family:'DM Mono',monospace;">📁 ${d.project}</span>`:''}
      </div>
      <div class="doc-date doc-cell-date">期日：${d.due||'未設定'}</div>
      <div class="doc-cell-status">
        <select class="status-select" onchange="updateStatus('${d.id}',this.value)">
          ${Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}" ${d.status===k?'selected':''}>${STATUS_ICONS[k]} ${v}</option>`).join('')}
        </select>
      </div>
      <div class="doc-cell-comment">
        <input class="comment-input" value="${d.comment}" placeholder="コメント（お客様にも表示されます）…" onchange="updateComment('${d.id}',this.value)">
      </div>
    </div>`).join('');
}

function updateStatus(docId,newStatus){
  let doc=null,cid=null;
  for(const k in data.documents){const d=data.documents[k].find(d=>d.id===docId);if(d){d.status=newStatus;doc=d;cid=k;break;}}
  renderCustomerGrid();
  showToast('ステータスを更新しました');
}

function updateComment(docId,comment){
  let doc=null,cid=null;
  for(const k in data.documents){const d=data.documents[k].find(d=>d.id===docId);if(d){d.comment=comment;doc=d;cid=k;break;}}
  showToast('コメントを保存しました');
}

function removeDoc(docId){
  if(!confirm('この書類を削除しますか？')) return;
  data.documents[selectedCustomerId]=data.documents[selectedCustomerId].filter(d=>d.id!==docId);
  renderDocList();renderCustomerGrid();
}

function addDocument(){
  const project=document.getElementById('newDocProject').value.trim();
  const name=document.getElementById('newDocName').value.trim();
  const due=document.getElementById('newDocDate').value;
  if(!name){showToast('書類名を入力してください');return;}
  if(!data.documents[selectedCustomerId]) data.documents[selectedCustomerId]=[];
  const newDoc={id:'d'+Date.now(),name,due,status:'pending',comment:'',project};
  data.documents[selectedCustomerId].push(newDoc);
  document.getElementById('newDocProject').value='';
  document.getElementById('newDocName').value='';
  document.getElementById('newDocDate').value='';
  renderDocList();renderCustomerGrid();
  showToast('書類を追加しました');
}

function showAddCustomer(){
  const name=prompt('お客様の氏名を入力してください:');
  if(!name||!name.trim()) return;
  const code=prompt('顧客CDを入力してください（例: C041）:');
  if(!code||!code.trim()) return;
  if(data.customers.find(c=>c.code===code.trim())){showToast('その顧客CDはすでに使用されています');return;}
  const id='c'+Date.now();
  data.customers.push({id,name:name.trim(),code:code.trim()});
  data.documents[id]=[];
  renderCustomerGrid();
  showToast(`「${name.trim()}」(${code.trim()}) を追加しました`);
}

function copyShareUrl(){
  if(!selectedCustomerId){showToast('お客様を選択してください');return;}
  const url=document.getElementById('shareUrlDisplay').textContent;
  navigator.clipboard.writeText(url).then(()=>showToast('URLをコピーしました 📋'));
}

function searchClient(){
  const q=document.getElementById('clientSearchInput').value.trim();
  const results=document.getElementById('clientSearchResults');
  document.getElementById('clientDocView').style.display='none';
  if(!q){results.innerHTML='';return;}
  const matches=data.customers.filter(c=>c.name.includes(q)||c.code.includes(q));
  if(matches.length===0){results.innerHTML='<div style="color:var(--text-sub);font-size:13px;padding:8px 0">該当するお客様が見つかりません</div>';return;}
  results.innerHTML=matches.map(c=>`
    <div style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;margin-top:8px;font-size:14px;font-weight:500;transition:all .15s"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"
      onclick="showClientDoc('${c.id}')">
      👤 ${c.name} <span style="font-size:11px;color:var(--text-sub);font-family:'DM Mono',monospace;margin-left:6px">${c.code}</span>
    </div>`).join('');
}

function showClientDoc(customerId){
  const c=data.customers.find(c=>c.id===customerId);
  if(!c) return;
  document.getElementById('clientDocView').style.display='block';
  document.getElementById('clientName').textContent=c.name+' 様';
  const docs=data.documents[c.id]||[];
  document.getElementById('sumSubmitted').textContent=docs.filter(d=>['submitted','complete'].includes(d.status)).length;
  document.getElementById('sumPending').textContent=docs.filter(d=>d.status==='pending').length;
  document.getElementById('sumMissing').textContent=docs.filter(d=>['missing','checking'].includes(d.status)).length;
  document.getElementById('clientSub').textContent=`全${docs.length}書類　最終更新：${new Date().toLocaleDateString('ja-JP')}`;
  const list=document.getElementById('clientDocList');
  if(docs.length===0){list.innerHTML='<div class="empty"><div class="empty-icon">📄</div><div class="empty-text">登録された書類はありません</div></div>';return;}
  list.innerHTML=docs.map(d=>`
    <div class="client-doc-item">
      <div class="doc-icon ${d.status}">${STATUS_ICONS[d.status]}</div>
      <div class="doc-info">
        <div class="doc-info-name">${d.name}</div>
        <div class="doc-info-meta">期日：${d.due||'未設定'}　　${STATUS_LABELS[d.status]}${d.project?`　📁 ${d.project}`:''}</div>
        ${d.comment?`<div class="doc-info-comment">💬 ${d.comment}</div>`:''}
      </div>
      <span class="status-badge status-${d.status}">${STATUS_LABELS[d.status]}</span>
    </div>`).join('');
  document.getElementById('clientSearchResults').innerHTML='';
  document.getElementById('clientSearchInput').value='';
}

// ===== EXPORT FOR KINTONE =====
function exportForKintone(){
  const records=[];
  data.customers.forEach(c=>{
    const docs=data.documents[c.id]||[];
    docs.forEach(d=>{
      records.push({
        顧客CD: c.code,
        顧客名: c.name,
        プロジェクト名: d.project||'',
        書類名: d.name,
        提出期日: d.due||'',
        提出ステータス: STATUS_LABELS[d.status]||d.status,
        コメント: d.comment||'',
        最終更新日時: new Date().toLocaleString('ja-JP')
      });
    });
  });
  const text=JSON.stringify(records,null,2);
  navigator.clipboard.writeText(text).then(()=>showToast('バックアップデータをコピーしました（'+records.length+'件）📋'));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
